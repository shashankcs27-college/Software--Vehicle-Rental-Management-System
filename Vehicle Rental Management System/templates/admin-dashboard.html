<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - VRMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0b0f19; color: white; padding: 50px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 30px; }
        .stat-card { background: #111827; padding: 20px; border-radius: 10px; border: 1px solid #1f2937; text-align: center; }
        .stat-card h3 { color: #f4b400; font-size: 24px; }
        .logout-btn { background: #ff4d4d; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Admin Control Panel</h1>
            <button onclick="logout()" class="logout-btn">Logout</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <p>Total Vehicles</p>
                <h3>12</h3>
            </div>
            <div class="stat-card">
                <p>Active Bookings</p>
                <h3>5</h3>
            </div>
            <div class="stat-card">
                <p>Total Users</p>
                <h3>28</h3>
            </div>
        </div>
    </div>

    <script>
        // Security Check: If not admin, kick them out
        if (localStorage.getItem("currentUserRole") !== "admin") {
            window.location.href = "login.html";
        }

        function logout() {
            localStorage.removeItem("currentUserRole");
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
